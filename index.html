<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Meses de Amor Interactivo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Pantalla de inicio -->
<div id="startMenu" class="menu">
    <h1>Creé esto para ti 💖</h1>
    <p>Ingresa el código para empezar nuestra historia:</p>
    <input type="text" id="startCode" placeholder="Código">
    <button id="startBtn">Comenzar</button>
    <p id="codeMessage" style="color:red;"></p>
</div>

<!-- Mensaje de escena -->
<div id="sceneMessage" class="message"></div>

<!-- Canvas del juego -->
<canvas id="gameCanvas"></canvas>

<!-- Pantalla final -->
<div id="finalScene" class="menu">
    <h1>¡Feliz 7 meses, Jonayliz! 💖</h1>
    <p id="finalMessage"></p>
    <button id="proposeBtn">Sí, quiero casarme contigo 💍</button>
</div>

<script src="app.js"></script>
</body>
</html>
