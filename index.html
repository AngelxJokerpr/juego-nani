<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>7 Meses de Amor 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Pantalla de inicio -->
  <div id="intro">
    <h1>Creé esto para ti porque te amo 💖</h1>
    <p>¡Vamos a revivir nuestros viajes y momentos juntos!</p>
    <button id="startBtn">COMENZAR</button>
  </div>

  <!-- Mensaje de historia -->
  <div id="storyText"></div>

  <!-- Canvas del juego -->
  <canvas id="game"></canvas>

  <!-- Mensaje de NPC -->
  <div id="dialog"></div>

  <!-- Pantalla final -->
  <div id="endScreen">
    <div id="loveLetter"></div>
    <button id="marryBtn">¿Quieres casarte conmigo? 💍</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
