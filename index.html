<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Amor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENÚ INICIO -->
<div id="startMenu" class="menu">
    <h1>Creé esto para ti 💖</h1>
    <p>Porque te amo, Jonayliz. Vamos a jugar nuestra historia.</p>
    <button id="startBtn">Comenzar</button>
</div>

<!-- CANVAS DEL JUEGO -->
<canvas id="gameCanvas"></canvas>

<!-- PANTALLA DE PUZZLE -->
<div id="puzzleScreen" class="menu">
    <h2>¡Has terminado los niveles! 😍</h2>
    <p>Ingresa el código para ver la sorpresa final:</p>
    <input type="text" id="puzzleCode" placeholder="Código">
    <button id="submitCodeBtn">Enviar</button>
    <p id="codeMessage"></p>
</div>

<!-- CARTA FINAL -->
<div id="finalCard" class="menu">
    <div id="ringsContainer"></div>
    <h1>¡Feliz 7 meses, Jonayliz! 💖</h1>
    <p>Estos 7 meses han sido increíbles… [aquí tu mensaje largo de amor]</p>
    <button id="proposeBtn">¿Quieres casarte conmigo? 💍</button>
</div>

<script src="app.js"></script>
</body>
</html>
