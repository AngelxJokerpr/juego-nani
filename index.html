<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Meses de Amor Interactivo</title>
<style>
body, html {
    margin:0; padding:0;
    width:100%; height:100%;
    overflow:hidden;
    font-family: 'Arial', sans-serif;
    background-color: #ffe6f2;
}
.menu {
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    z-index:10;
    text-align:center;
    padding:20px;
}
#finalScene, #sceneMessage, #gameCanvas {
    display:none;
}
#gameCanvas {
    width:100%; height:100%;
}
button {
    padding:15px 30px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background-color:#ff66b3;
    color:white;
    transition:0.3s;
}
button:hover { background-color:#ff3399; }
.message {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    color: white;
    font-size: 22px;
    text-align: center;
    text-shadow: 2px 2px 4px black;
}
</style>
</head>
<body>

<div id="startMenu" class="menu">
    <h1>Creé esto para ti 💖</h1>
    <p>Ingresa el código para empezar nuestra historia:</p>
    <input type="text" id="startCode" placeholder="Código">
    <button id="startBtn">Comenzar</button>
    <p id="codeMessage" style="color:red;"></p>
</div>

<div id="sceneMessage" class="message"></div>
<canvas id="gameCanvas"></canvas>

<div id="finalScene" class="menu">
    <h1>¡Feliz 7 meses, Jonayliz! 💖</h1>
    <p id="finalMessage"></p>
    <button id="proposeBtn">Sí, quiero casarme contigo 💍</button>
</div>

<script src="app.js"></script>
</body>
</html>
