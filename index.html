<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Meses de Amor - Modo Cine Pro</title>
<style>
  body, html { margin:0; padding:0; overflow:hidden; font-family:sans-serif; }
  canvas { display:block; }
  #storyText {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    color:white; font-size:22px; background:rgba(0,0,0,0.5); padding:12px; border-radius:12px;
    max-width:90%; text-align:center;
  }
  #dialog {
    position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
    color:white; font-size:20px; background:rgba(0,0,0,0.5); padding:10px; border-radius:10px;
    max-width:80%; text-align:center;
  }
  #intro {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:pink; display:flex; flex-direction:column; justify-content:center; align-items:center;
    color:white; font-size:32px; text-align:center;
  }
  #intro button {
    margin-top:20px; padding:12px 25px; font-size:22px; border:none; border-radius:12px; cursor:pointer;
    background:white; color:pink; font-weight:bold;
  }
</style>
</head>
<body>
<div id="intro">
  <div>💖 Esto lo creé para ti porque te amo 💖</div>
  <div>7 meses juntos, y muchas aventuras por delante</div>
  <button onclick="start()">Comenzar</button>
</div>
<canvas id="game"></canvas>
<div id="storyText"></div>
<div id="dialog"></div>
<script src="app_cine.js"></script>
</body>
</html>
