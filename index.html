<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Meses Juntos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Menú de inicio -->
<div id="startMenu">
    <h1>¡Feliz 7 meses! 💖</h1>
    <p>Creé esto para ti porque te amo 💕</p>
    <button id="startBtn">Comenzar</button>
</div>

<!-- Canvas del juego -->
<canvas id="gameCanvas"></canvas>

<!-- Puzzle final -->
<div id="puzzleScreen" style="display:none; flex-direction:column; align-items:center; justify-content:center;">
    <h2>¡Traté de hacerte algo diferente! 💖</h2>
    <p>Introduce el código para desbloquear tu sorpresa:</p>
    <input type="text" id="puzzleCode" placeholder="Código secreto"/>
    <button id="submitCodeBtn">Enviar</button>
    <p id="codeMessage" style="color:red;"></p>
</div>

<!-- Carta final -->
<div id="finalCard" style="display:none; flex-direction:column; align-items:center;">
    <h1>¡Feliz 7 meses, Jonayliz! 💖</h1>
    <p>Traté de hacerte algo diferente, te amo más que ayer y menos que mañana ❤️</p>
    <div id="ringsContainer" style="position:relative; width:100%; height:200px;"></div>
    <button id="proposeBtn">¿Quieres casarte conmigo? 💍</button>
</div>

<script src="app.js"></script>
</body>
</html>
